name: Video Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Set up Google Service Account
        env: |
          GOOGLE_SERVICE_ACCOUNT_FILE: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_FILE }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_FILE" > service_account.json
      
      - name: Run automation
        env: |
          DRIVE_FOLDER_PREFIX: ${{ secrets.DRIVE_FOLDER_PREFIX }}
          PROCESSED_FOLDER_PREFIX: ${{ secrets.PROCESSED_FOLDER_PREFIX }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          YOUTUBE_TOKEN_FILE: ${{ secrets.YOUTUBE_TOKEN_FILE }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          ENABLE_YOUTUBE_UPLOAD: ${{ secrets.ENABLE_YOUTUBE_UPLOAD }}
          ENABLE_FACEBOOK_UPLOAD: ${{ secrets.ENABLE_FACEBOOK_UPLOAD }}
          ENABLE_INSTAGRAM_UPLOAD: ${{ secrets.ENABLE_INSTAGRAM_UPLOAD }}
        run: python main.py