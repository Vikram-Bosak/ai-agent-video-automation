name: Video Automation

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run bypass schedule'
        required: false
        default: false
        type: boolean

jobs:
  automate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: 🔍 Full Secret Diagnostics
        env:
          SA_JSON_VAL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_SERVICE_ACCOUNT_FILE || secrets.GOOGLE_CREDENTIALS }}
          YT_TOKEN_VAL: ${{ secrets.YOUTUBE_TOKEN_JSON || secrets.YOUTUBE_TOKEN_FILE || secrets.YOUTUBE_TOKEN }}
          NVIDIA_VAL: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_VAL: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DRIVE_VAL: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          echo "Checking all secret slots (Values are hidden for security)..."
          [ -n "$SA_JSON_VAL" ] && echo "✅ Google Service Account secret found" || echo "❌ Google Service Account secret missing"
          [ -n "$YT_TOKEN_VAL" ] && echo "✅ YouTube Token secret found" || echo "❌ YouTube Token secret missing"
          [ -n "$NVIDIA_VAL" ] && echo "✅ NVIDIA_API_KEY found" || echo "❌ NVIDIA_API_KEY missing"
          [ -n "$TELEGRAM_VAL" ] && echo "✅ TELEGRAM_BOT_TOKEN found" || echo "❌ TELEGRAM_BOT_TOKEN missing"
          [ -n "$DRIVE_VAL" ] && echo "✅ GOOGLE_DRIVE_FOLDER_ID found" || echo "❌ GOOGLE_DRIVE_FOLDER_ID missing"
          echo "------------------------------------------------"
          echo "NOTE: If you see ❌, the automation WILL FAIL."
          echo "Go to Settings > Secrets and variables > Actions to fix!"
      
      - name: Set up Google Service Account
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_SERVICE_ACCOUNT_FILE || secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$SA_JSON" ]; then
            python -c "import os; open('service_account.json', 'w').write(os.environ.get('SA_JSON', ''))"
            echo "✅ Google Service Account created from secret."
          elif [ -f service_account.json ]; then
            echo "⚠️ Secret not found, using existing service_account.json from repository."
          else
            echo "❌ ERROR: No service account found in secrets or repository!"
            exit 1
          fi
          python -c "import json; json.load(open('service_account.json'))" || (echo "❌ ERROR: Invalid JSON in service_account.json" && exit 1)
      
      - name: Set up YouTube OAuth
        env:
          YT_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON || secrets.YOUTUBE_TOKEN_FILE || secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -n "$YT_JSON" ]; then
            python -c "import os; open('youtube_token.json', 'w').write(os.environ.get('YT_JSON', ''))"
            echo "✅ YouTube Token created from secret."
          elif [ -f youtube_token.json ]; then
            echo "⚠️ Secret not found, using existing youtube_token.json from repository."
          else
            echo "⚠️ WARNING: No YouTube token found."
          fi
          if [ -f youtube_token.json ]; then
            python -c "import json; json.load(open('youtube_token.json'))" || (echo "❌ ERROR: Invalid JSON in youtube_token.json" && rm youtube_token.json)
          fi
      
      - name: Run automation
        env:
          DRIVE_FOLDER_PREFIX: ${{ secrets.DRIVE_FOLDER_PREFIX }}
          PROCESSED_FOLDER_PREFIX: ${{ secrets.PROCESSED_FOLDER_PREFIX }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          ENABLE_YOUTUBE_UPLOAD: ${{ secrets.ENABLE_YOUTUBE_UPLOAD }}
          ENABLE_FACEBOOK_UPLOAD: ${{ secrets.ENABLE_FACEBOOK_UPLOAD }}
          ENABLE_INSTAGRAM_UPLOAD: ${{ secrets.ENABLE_INSTAGRAM_UPLOAD }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: python main.py

      - name: Save State (Tracker & Logs)
        if: always()
        run: |
          git config --global user.name "AI Automation Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add upload_tracker.json automation.log || true
          git commit -m "chore: update upload tracker and logs [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"