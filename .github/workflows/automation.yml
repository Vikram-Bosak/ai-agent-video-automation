name: Video Automation

on:
  schedule:
    # Run every 30 minutes to check upload windows
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run (skip window/rate-limit checks)'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install cryptography>=42.0.0

      - name: Setup Service Account (base64 decode)
        env:
          SA_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          if [ -n "$SA_JSON_B64" ]; then
            echo "$SA_JSON_B64" | base64 -d > service_account.json
            echo "✅ Service account file created from base64 secret"
          elif [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ]; then
            # Fallback: direct JSON from secret (may have PEM issues)
            echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > service_account.json
            echo "⚠️  Using direct JSON (may have PEM issues — use base64 method)"
          else
            echo "❌ No GOOGLE_SERVICE_ACCOUNT_JSON_B64 secret found!"
            echo "Run: python setup_github_secrets.py service_account.json"
            exit 1
          fi

      - name: Setup YouTube Token
        env:
          YT_TOKEN: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          if [ -n "$YT_TOKEN" ]; then
            echo "$YT_TOKEN" > youtube_token.json
            echo "✅ YouTube token file created"
          fi

      - name: Setup .env file
        env:
          DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DONE_FOLDER_ID: ${{ secrets.DONE_FOLDER_ID }}
          ERROR_FOLDER_ID: ${{ secrets.ERROR_FOLDER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          IG_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: |
          cat > .env << EOF
          GOOGLE_SERVICE_ACCOUNT_FILE=service_account.json
          GOOGLE_DRIVE_FOLDER_ID=${DRIVE_FOLDER_ID}
          DONE_FOLDER_ID=${DONE_FOLDER_ID}
          ERROR_FOLDER_ID=${ERROR_FOLDER_ID}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          NVIDIA_API_KEY=${NVIDIA_API_KEY}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS}
          TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
          FACEBOOK_PAGE_ACCESS_TOKEN=${FB_PAGE_TOKEN}
          FACEBOOK_PAGE_ID=${FB_PAGE_ID}
          INSTAGRAM_PAGE_ACCESS_TOKEN=${IG_PAGE_TOKEN}
          INSTAGRAM_BUSINESS_ACCOUNT_ID=${IG_BUSINESS_ID}
          YOUTUBE_TOKEN_FILE=youtube_token.json
          YOUTUBE_CLIENT_SECRETS=client_secrets.json
          EOF
          echo "✅ .env file created"

      - name: Run Automation
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: |
          python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs
          path: |
            automation.log
            logs/
          retention-days: 7
